site_name: MOSADE
site_description: Multi-Objective Self-Adaptive Differential Evolution — a tested, CI-backed Python library for constrained multi-objective optimization.
site_url: https://Levvvi.github.io/MOSADE/
repo_url: https://github.com/Levvvi/MOSADE
repo_name: Levvvi/MOSADE

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      toggle: { icon: material/weather-night, name: Switch to dark mode }
    - scheme: slate
      primary: indigo
      toggle: { icon: material/weather-sunny, name: Switch to light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_root_heading: true
            show_source: true
            members_order: source
            separate_signature: true

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - toc: { permalink: true }

nav:
  - Home: index.md
  - Usage: usage.md
  - API reference: api.md